name: ci

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2

      - name: run protolint
        uses: plexsystems/protolint-action@v0.7.0

  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2

      - name: Install Protoc
        uses: arduino/setup-protoc@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.21'
      - name: Install protoc-gen-go-lite
        run: go install github.com/aperturerobotics/protobuf-go-lite/cmd/protoc-gen-go-lite@latest

      - name: generate language files
        run: make build clean
        env:
          GOPATH: /home/runner/go
